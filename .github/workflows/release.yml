name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -race ./...

  build-linux:
    name: Build (linux)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build linux/amd64
        run: |
          REPO_VERSION=$(git describe --tags --always)
          GIT_HASH=$(git rev-parse --short HEAD)
          LDFLAGS="-s -w -extldflags=-static -X main.version=${REPO_VERSION} -X main.gitCommit=${GIT_HASH}"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o bin/adbx-linux-amd64 .

      - uses: actions/upload-artifact@v4
        with:
          name: adbx-linux-amd64
          path: bin/adbx-linux-amd64

  build-darwin:
    name: Build (darwin)
    runs-on: macos-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build darwin/amd64
        run: |
          REPO_VERSION=$(git describe --tags --always)
          GIT_HASH=$(git rev-parse --short HEAD)
          LDFLAGS="-s -w -X main.version=${REPO_VERSION} -X main.gitCommit=${GIT_HASH}"
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o bin/adbx-darwin-amd64 .
          codesign --sign - bin/adbx-darwin-amd64

      - name: Build darwin/arm64
        run: |
          REPO_VERSION=$(git describe --tags --always)
          GIT_HASH=$(git rev-parse --short HEAD)
          LDFLAGS="-s -w -X main.version=${REPO_VERSION} -X main.gitCommit=${GIT_HASH}"
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o bin/adbx-darwin-arm64 .
          codesign --sign - bin/adbx-darwin-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: adbx-darwin-amd64
          path: bin/adbx-darwin-amd64

      - uses: actions/upload-artifact@v4
        with:
          name: adbx-darwin-arm64
          path: bin/adbx-darwin-arm64

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [build-linux, build-darwin]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: adbx-linux-amd64
          path: bin/

      - uses: actions/download-artifact@v4
        with:
          name: adbx-darwin-amd64
          path: bin/

      - uses: actions/download-artifact@v4
        with:
          name: adbx-darwin-arm64
          path: bin/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/adbx-linux-amd64
            bin/adbx-darwin-amd64
            bin/adbx-darwin-arm64
          generate_release_notes: true
